# Team Configuration - GoClaw Team Setup
# Generated by team setup process

team_name: "default-team"
team_type: "development"
team_size: 5
delivery_horizon: "30d"
compliance_tier: "L2"

roles:
  lead:
    name: "team-lead"
    permissions: ["admin", "deploy", "approve"]
    escalation_target: true
    sla_response_time: "15m"

  member:
    name: "team-member"
    permissions: ["read", "write", "execute"]
    escalation_target: false

  reviewer:
    name: "quality-reviewer"
    permissions: ["read", "review", "approve"]
    escalation_target: false

sla_standards:
  response_time:
    critical: "5m"
    high: "15m"
    medium: "1h"
    low: "4h"

  delivery_time:
    critical: "1d"
    high: "3d"
    medium: "7d"
    low: "30d"

governance:
  approval_required:
    - "deployments"
    - "schema_changes"
    - "production_access"

  conflict_resolution: "lead_arbitration"
  audit_logging: true